version: "3.9"

services:
  opensearch-node1:
    image: opensearchproject/opensearch:2.14.0
    env_file:
      - .env.example
    volumes:
      - ./configs/opensearch/security-config/opensearch.yml:/usr/share/opensearch/config/opensearch.yml
      - ./configs/opensearch/security-config/audit.yml:/usr/share/opensearch/config/opensearch-security/audit.yml

  vector-wazuh:
    image: timberio/vector:0.34.1-alpine
    env_file:
      - .env.example
    volumes:
      - ./configs/ingest/vector/vector-wazuh.toml:/etc/vector/vector.toml

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
