name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test
        run: npm test

      - name: Scan broken fixture
        run: node ./bin/soc-doctor.js scan ./examples/broken-stack --fail-on critical || true

      - name: Scan healthy fixture
        run: node ./bin/soc-doctor.js scan ./examples/healthy-stack --fail-on critical
